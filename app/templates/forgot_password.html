<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Estoque Marceneiro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <main class="auth-shell auth-shell-single">
        <section class="auth-card auth-card-wide">
            <div>
                <span class="eyebrow">Recuperacao de senha</span>
                <h2>Crie uma nova senha</h2>
                <p class="muted">Informe o e-mail cadastrado, receba o codigo e redefina sua senha.</p>
            </div>

            <form id="forgotPasswordForm" class="stack-form">
                <label>
                    <span>E-mail cadastrado</span>
                    <input type="email" id="resetEmail" placeholder="seuemail@empresa.com" required>
                </label>

                <button type="submit" class="btn btn-secondary btn-block">Enviar codigo</button>
            </form>

            <form id="resetPasswordForm" class="stack-form">
                <label>
                    <span>Codigo de 8 caracteres</span>
                    <input type="text" id="resetCode" maxlength="8" placeholder="ABC12345" required>
                </label>

                <label>
                    <span>Nova senha</span>
                    <input type="password" id="newPassword" placeholder="Digite a nova senha" required>
                </label>

                <label>
                    <span>Confirmar nova senha</span>
                    <input type="password" id="confirmNewPassword" placeholder="Repita a nova senha" required>
                </label>

                <button type="submit" class="btn btn-primary btn-block">Salvar nova senha</button>
            </form>

            <p id="resetMsg" class="form-message"></p>
            <p class="auth-link"><a href="/">Voltar para o login</a></p>
        </section>
    </main>

    <script>
        document.getElementById("forgotPasswordForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = document.getElementById("resetEmail").value;
            const response = await fetch("/forgot-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            const data = await response.json();
            document.getElementById("resetMsg").textContent = data.message;
        });

        document.getElementById("resetPasswordForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            const payload = {
                email: document.getElementById("resetEmail").value,
                code: document.getElementById("resetCode").value,
                new_password: document.getElementById("newPassword").value,
                confirm_password: document.getElementById("confirmNewPassword").value
            };

            const response = await fetch("/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            document.getElementById("resetMsg").textContent = data.message;

            if (data.success) {
                document.getElementById("resetPasswordForm").reset();
            }
        });
    </script>
</body>
</html>
